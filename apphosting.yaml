runConfig:
  runtime: nodejs20
  concurrency: 100
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 100

env:
  - variable: NODE_ENV
    value: production
  - variable: JWT_SECRET
    secret: JWT_SECRET
  - variable: NEXT_PUBLIC_APP_URL
    value: https://shopify-esteroides--shopify-esteroides-2026.us-central1.hosted.app
